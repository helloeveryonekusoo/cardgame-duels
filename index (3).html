<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>クソカードゲーム作ってみたよ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Noto+Serif+JP:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-base: #1a1d27;
  --bg-panel: #232838;
  --bg-panel-raised: #2d3347;
  --bg-panel-deep: #14161f;
  --text-primary: #ece6d8;
  --text-muted: #93989f;
  --text-faint: #5c6170;
  --civ-fire: #e2542b;   --civ-fire-dark: #7a2414;
  --civ-water: #2f8fd1;  --civ-water-dark: #15426b;
  --civ-nature: #5a9c3f; --civ-nature-dark: #2a4a1f;
  --civ-light: #d9b03c;  --civ-light-dark: #6b5618;
  --civ-dark: #8b6bc4;   --civ-dark-dark: #3d2f5c;
  --spectrum: linear-gradient(90deg, var(--civ-fire), var(--civ-light) 25%, var(--civ-nature) 50%, var(--civ-water) 75%, var(--civ-dark));
  --font-display: 'Cinzel', serif;
  --font-card: 'Noto Serif JP', serif;
  --font-ui: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic Medium', 'Noto Sans JP', sans-serif;
  --r-sm: 6px; --r-md: 10px; --r-lg: 16px;
  --shadow-1: 0 2px 6px rgba(0,0,0,.45);
  --shadow-2: 0 10px 28px rgba(0,0,0,.6);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin:0; padding:0; }
body {
  background: var(--bg-base);
  color: var(--text-primary);
  font-family: var(--font-ui);
  min-height: 100vh;
  overscroll-behavior-y: none;
}
#app { min-height: 100vh; display:flex; flex-direction:column; }
button { font-family: inherit; }
img, svg { display:block; }
::-webkit-scrollbar { height:5px; width:5px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius:4px; }

.spectrum-bar { height: 3px; background: var(--spectrum); flex-shrink:0; }
.spectrum-bar.thick { height: 5px; }

/* ============ Buttons ============ */
.btn {
  font-family: var(--font-ui);
  font-size: 14px; font-weight:600;
  padding: 11px 22px;
  border-radius: var(--r-md);
  border: 1px solid rgba(255,255,255,.12);
  background: var(--bg-panel-raised);
  color: var(--text-primary);
  cursor:pointer;
  transition: filter .15s, transform .1s;
  white-space: nowrap;
}
.btn:active { transform: scale(.97); }
.btn:hover { filter: brightness(1.18); }
.btn-primary { background: linear-gradient(135deg, #44507a, #2a2f47); border-color: rgba(255,255,255,.22); }
.btn-ghost { background: transparent; border-color: rgba(255,255,255,.18); }
.btn-danger-ghost { background: transparent; border-color: var(--civ-fire); color: var(--civ-fire); }
.btn:disabled { opacity:.32; cursor:not-allowed; filter:none; }
.btn-sm { font-size:12px; padding:7px 14px; }
.btn-block { width:100%; }

/* ============ Generic screens (start / turn intro / game over) ============ */
.screen-center {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding: 36px 20px; gap: 20px;
}
.logo-title { font-family: var(--font-display); font-size: clamp(34px,9vw,54px); letter-spacing: .07em; font-weight:700; }
.logo-sub { font-family: var(--font-card); font-size: 16px; color: var(--text-muted); letter-spacing:.08em; }
.rules-blurb { max-width: 460px; color: var(--text-muted); font-size: 13.5px; line-height:1.85; text-align:left; }
.rules-blurb b { color: var(--text-primary); }
.civ-legend { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; margin-top:4px; }
.civ-chip { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-muted); }
.civ-dot { width:11px; height:11px; border-radius:50%; flex-shrink:0; }

.turn-banner-name { font-family: var(--font-card); font-size: clamp(28px,7.5vw,42px); font-weight:700; }
.turn-banner-sub { color: var(--text-muted); font-size:13px; max-width:320px; line-height:1.7; }

.winner-banner { font-family: var(--font-display); font-size: clamp(26px,7vw,38px); font-weight:700; letter-spacing:.03em; }

/* ============ Board layout ============ */
.board { flex:1; display:flex; flex-direction:column; min-height:100vh; }
.player-row { padding: 10px 12px; display:flex; flex-direction:column; gap:7px; }
.player-row.opponent { padding-top: max(12px, env(safe-area-inset-top)); background: linear-gradient(to bottom, rgba(0,0,0,.18), transparent); }
.player-row.mine { padding-bottom: max(12px, env(safe-area-inset-bottom)); flex:1; display:flex; flex-direction:column; justify-content:flex-end; background: linear-gradient(to top, rgba(0,0,0,.18), transparent); }

.player-header { display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap; }
.player-name-block { display:flex; align-items:center; gap:9px; }
.player-name { font-family: var(--font-card); font-weight:700; font-size:14px; }
.turn-dot { width:7px; height:7px; border-radius:50%; background: var(--civ-light); display:inline-block; margin-right:7px; box-shadow: 0 0 6px var(--civ-light); animation: dot-pulse 1.6s infinite; }
.meta-pips { display:flex; gap:10px; align-items:center; font-size:11px; color:var(--text-muted); }
.shield-pips { display:flex; gap:3px; }
.shield-pip { width:8px; height:13px; border-radius:2px; background: linear-gradient(180deg, var(--civ-light), var(--civ-light-dark)); }
.shield-pip.empty { background: transparent; border:1px solid var(--text-faint); }
.deck-count, .gy-count { display:flex; align-items:center; gap:4px; cursor:pointer; padding:2px 5px; border-radius:5px; }
.deck-count:hover, .gy-count:hover { background: rgba(255,255,255,.06); }
.deck-count svg, .gy-count svg { width:13px;height:13px; opacity:.8; }

.mana-row { display:flex; gap:4px; flex-wrap:wrap; min-height: 24px; align-items:center; }
.mana-chip {
  width:21px; height:21px; border-radius:50%; flex-shrink:0;
  border:2px solid var(--mc, #777);
  display:flex;align-items:center;justify-content:center;
  font-family: var(--font-display); font-size:9px; font-weight:700; color:var(--mc,#aaa);
  background: rgba(0,0,0,.3);
}
.mana-chip.tapped { opacity:.28; }
.empty-hint { font-size:11px; color:var(--text-faint); font-style:italic; }

.battle-zone { display:flex; gap:7px; overflow-x:auto; padding:5px 2px; min-height: 100px; align-items:flex-start; }
.empty-zone-hint { color: var(--text-faint); font-size:11px; font-style:italic; padding: 36px 6px; }

.hand-wrap { position:relative; }
.hand-row { display:flex; gap:6px; overflow-x:auto; padding: 4px 6px 8px; -webkit-overflow-scrolling:touch; scroll-behavior:smooth; scroll-snap-type:x proximity; overscroll-behavior-x:contain; touch-action:pan-x; }
.hand-row > .card { scroll-snap-align:center; }
.hand-row::-webkit-scrollbar { height:7px; }
.hand-row::-webkit-scrollbar-track { background:rgba(255,255,255,.05); border-radius:4px; }
.hand-row::-webkit-scrollbar-thumb { background:rgba(255,255,255,.28); border-radius:4px; }
.hand-row::-webkit-scrollbar-thumb:hover { background:rgba(255,255,255,.45); }
.hand-scroll-btn { position:absolute; top:50%; transform:translateY(-60%); z-index:6; width:30px; height:44px; border-radius:8px; border:1px solid rgba(255,255,255,.18); background:rgba(20,18,16,.82); color:var(--text-primary); font-size:16px; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,.5); user-select:none; }
.hand-scroll-btn:active { background:rgba(40,36,32,.95); }
.hand-scroll-btn.left { left:-2px; }
.hand-scroll-btn.right { right:-2px; }
.hand-count-pill { position:absolute; top:-2px; right:8px; z-index:6; font-size:10px; color:var(--text-muted); background:rgba(20,18,16,.8); border-radius:10px; padding:1px 8px; pointer-events:none; }

/* ============ Card ============ */
.card {
  --cc: #888; --ccd:#333;
  width: 78px; flex-shrink:0; border-radius: var(--r-md);
  background: var(--bg-panel-raised);
  box-shadow: var(--shadow-1);
  overflow:hidden; cursor:pointer; user-select:none;
  border: 1px solid rgba(255,255,255,.08);
  transition: transform .15s ease, box-shadow .15s ease;
  position:relative;
}
.card:active { transform: scale(.96); }
.card.selectable:hover { transform: translateY(-5px); box-shadow: var(--shadow-2); }
.card.not-selectable { cursor: default; }
.card.tapped { opacity:.5; }
.card.sick { opacity:.78; }
.card.sick .card-sick-tag {
  position:absolute; bottom:0; left:0; right:0; text-align:center;
  font-size:7.5px; letter-spacing:.04em; color:#fff; background:rgba(0,0,0,.6); padding:1.5px 0;
}
.card.selected-attacker { box-shadow: 0 0 0 3px var(--civ-light), var(--shadow-2); transform: translateY(-5px); }
.card.valid-target { box-shadow: 0 0 0 3px var(--civ-fire), var(--shadow-2); animation: pulse-target 1.3s infinite; }
.card.inert { opacity:.32; pointer-events:none; }
[data-action]:focus-visible { outline: 2px solid var(--civ-light); outline-offset:2px; border-radius:4px; }
.card.lg { width: 208px; cursor:default; }
.card[data-civ="fire"]   { --cc: var(--civ-fire);   --ccd: var(--civ-fire-dark); }
.card[data-civ="water"]  { --cc: var(--civ-water);  --ccd: var(--civ-water-dark); }
.card[data-civ="nature"] { --cc: var(--civ-nature); --ccd: var(--civ-nature-dark); }
.card[data-civ="light"]  { --cc: var(--civ-light);  --ccd: var(--civ-light-dark); }
.card[data-civ="dark"]   { --cc: var(--civ-dark);   --ccd: var(--civ-dark-dark); }
.card[data-civ="multi"]  { --cc: #4faf9e; --ccd: #1f4f4a; }

.card-head {
  background: linear-gradient(160deg, var(--cc), var(--ccd));
  padding: 4px 5px 3px; display:flex; align-items:flex-start; justify-content:space-between; gap:3px;
}
.card-cost {
  width:17px;height:17px;border-radius:50%; background: rgba(0,0,0,.45); color:#fff;
  display:flex;align-items:center;justify-content:center; font-family:var(--font-display); font-size:10px; font-weight:700; flex-shrink:0;
  border: 1px solid rgba(255,255,255,.32);
}
.card.lg .card-cost { width:26px;height:26px;font-size:14px; }
.card-name { font-family: var(--font-card); font-size: 10px; font-weight:700; color:#fff; line-height:1.3; text-shadow: 0 1px 2px rgba(0,0,0,.45); }
.card.lg .card-name { font-size:16px; }
.card-art {
  height:42px; display:flex; align-items:center; justify-content:center;
  background: linear-gradient(160deg, color-mix(in srgb, var(--cc) 22%, var(--bg-panel-deep)), var(--bg-panel-deep));
}
.card.lg .card-art { height:88px; }
.card-art svg { width: 24px; height:24px; opacity:.95; }
.card.lg .card-art svg { width:46px;height:46px; }
.card-body { padding: 4px 5px 2px; min-height: 24px; }
.card-text { font-size: 8px; line-height:1.4; color: var(--text-muted); }
.card.lg .card-text { font-size:12.5px; line-height:1.6; }
.card-abilities { display:flex; gap:2px; flex-wrap:wrap; margin-bottom:2px; }
.ability-badge {
  width:13px;height:13px;border-radius:50%; background: rgba(255,255,255,.14); color:#fff;
  font-size:7.5px; display:flex;align-items:center;justify-content:center; font-family: var(--font-card); font-weight:700; flex-shrink:0;
}
.card.lg .ability-badge { width:22px;height:22px;font-size:12px; }
.card-foot { display:flex; justify-content:flex-end; align-items:center; padding: 1px 5px 4px; }
.card-power { font-family: var(--font-display); font-weight:700; font-size:11.5px; color:#fff; }
.card.lg .card-power { font-size:19px; }

.card-back { background: var(--bg-panel-deep); display:flex; align-items:center; justify-content:center; cursor:default; }
.card-back .mark { width:58%; height:3px; background: var(--spectrum); border-radius:2px; opacity:.9; }

/* ============ Center strip ============ */
.center-strip { background: var(--bg-panel); padding: 9px 12px 11px; display:flex; flex-direction:column; gap:7px; }
.turn-indicator { display:flex; align-items:center; justify-content:space-between; gap:8px; }
.turn-text { font-family: var(--font-card); font-size: 13px; font-weight:700; }
.turn-text .n { color: var(--text-muted); font-weight:500; margin-right:6px; font-family: var(--font-ui); }
.log-feed { background: var(--bg-panel-deep); border-radius: var(--r-sm); padding: 7px 10px; font-size:11.5px; color:var(--text-muted); max-height: 58px; overflow-y:auto; line-height:1.7; }
.log-feed .latest { color: var(--text-primary); }
.log-feed div { opacity:.85; }
.log-feed div.latest { opacity:1; }

/* ============ Targeting banner ============ */
.card.attacking { animation: atkPulse .55s ease-out 2; box-shadow:0 0 0 2px var(--civ-fire), 0 0 18px var(--civ-fire) !important; z-index:5; }
.card.being-hit { animation: hitShake .5s ease-in-out 2; box-shadow:0 0 0 2px #ff5a5a, 0 0 18px #ff5a5a !important; z-index:5; }
.card.attacking.resolving { animation: atkGlow 1.1s ease-in-out infinite; box-shadow:0 0 0 2px var(--civ-fire), 0 0 22px var(--civ-fire) !important; }
.card.being-hit.resolving { animation: hitGlow 1.1s ease-in-out infinite; box-shadow:0 0 0 2px #ff5a5a, 0 0 22px #ff5a5a !important; }
@keyframes atkGlow { 0%,100%{ box-shadow:0 0 0 2px var(--civ-fire), 0 0 14px var(--civ-fire); } 50%{ box-shadow:0 0 0 3px var(--civ-fire), 0 0 28px var(--civ-fire); } }
@keyframes hitGlow { 0%,100%{ box-shadow:0 0 0 2px #ff5a5a, 0 0 14px #ff5a5a; } 50%{ box-shadow:0 0 0 3px #ff5a5a, 0 0 28px #ff5a5a; } }
.attack-banner.resolving { border-color:var(--civ-light); animation:atkBannerIn .35s ease-out; }
.attack-banner.resolving .ab-sub { color:var(--civ-light); }
@keyframes atkPulse { 0%{transform:translateY(0);} 40%{transform:translateY(-8px) scale(1.06);} 100%{transform:translateY(0);} }
@keyframes hitShake { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-5px);} 40%{transform:translateX(5px);} 60%{transform:translateX(-3px);} 80%{transform:translateX(3px);} }
.attack-banner { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:200; pointer-events:none;
  background:linear-gradient(120deg, rgba(20,10,10,.94), rgba(40,15,15,.94)); border:1.5px solid var(--civ-fire);
  border-radius:var(--r-md); padding:14px 26px; box-shadow:0 8px 40px rgba(0,0,0,.6), 0 0 24px rgba(214,90,60,.4);
  font-family:var(--font-display); text-align:center; animation:atkBannerIn .35s ease-out, atkBannerOut .35s ease-in 1.15s forwards; }
.attack-banner .ab-main { font-size:15px; font-weight:700; color:#fff; white-space:nowrap; }
.attack-banner .ab-sub { font-size:11px; color:var(--civ-fire); margin-top:3px; letter-spacing:.1em; }
.attack-banner .ab-arrow { color:var(--civ-fire); margin:0 8px; }
.attack-banner.direct { border-color:#ff5a5a; }
.attack-banner.direct .ab-main { color:#ffdada; }
@keyframes atkBannerIn { from{opacity:0; transform:translate(-50%,-50%) scale(.8);} to{opacity:1; transform:translate(-50%,-50%) scale(1);} }
@keyframes atkBannerOut { to{opacity:0; transform:translate(-50%,-58%) scale(.95);} }
.targeting-banner {
  background: linear-gradient(135deg, var(--civ-fire-dark), #4a2418);
  border:1px solid var(--civ-fire); border-radius:var(--r-sm); padding:9px 12px;
  display:flex; align-items:center; justify-content:space-between; gap:10px; font-size:12.5px;
}
.target-face {
  display:flex; align-items:center; justify-content:center;
  border:2px dashed var(--text-faint); border-radius:var(--r-md);
  padding: 14px 8px; margin: 0 2px; font-size:12px; color:var(--text-muted); cursor:pointer;
  transition: border-color .15s, color .15s;
}
.target-face.valid-target { border-color: var(--civ-fire); color: var(--text-primary); animation: pulse-target-bg 1.3s infinite; cursor:pointer; }

/* ============ Modal ============ */
.modal-overlay { position:fixed; inset:0; background: rgba(8,9,13,.8); display:flex; align-items:center; justify-content:center; padding:18px; z-index:50; }
.modal-box { background: var(--bg-panel); border-radius: var(--r-lg); padding: 22px; max-width: 380px; width:100%; box-shadow: var(--shadow-2); display:flex; flex-direction:column; gap:16px; max-height:88vh; overflow-y:auto; border: 1px solid rgba(255,255,255,.08); }
.modal-title { font-family: var(--font-card); font-size:15.5px; font-weight:700; text-align:center; }
.modal-card-preview { display:flex; justify-content:center; }
.modal-actions { display:flex; flex-direction:column; gap:9px; }
.modal-actions.row { flex-direction:row; }
.modal-actions .btn { width:100%; }
.target-grid { display:flex; gap:9px; flex-wrap:wrap; justify-content:center; max-height:46vh; overflow-y:auto; padding: 2px; }
.gy-list { display:flex; flex-direction:column; gap:6px; max-height: 50vh; overflow-y:auto; }
.gy-row { display:flex; align-items:center; gap:8px; font-size:13px; padding:6px 8px; border-radius:6px; background: var(--bg-panel-raised); }
.gy-row .gy-dot { width:8px;height:8px;border-radius:50%; flex-shrink:0; }

@keyframes pulse-target { 0%,100%{ box-shadow: 0 0 0 3px var(--civ-fire), var(--shadow-2);} 50%{ box-shadow: 0 0 0 6px var(--civ-fire), var(--shadow-2);} }
@keyframes pulse-target-bg { 0%,100%{ background: rgba(226,84,43,.12); } 50%{ background: rgba(226,84,43,.28);} }
@keyframes dot-pulse { 0%,100%{ opacity:1; } 50%{ opacity:.35; } }

@media (max-width: 430px) {
  .card { width: 70px; }
  .card-art { height:36px; }
  .card-art svg { width:20px;height:20px; }
  .battle-zone { min-height: 90px; }
  .card.lg { width: 180px; }
}
@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
}

.waiting-banner { text-align:center; font-size:12px; color:var(--text-muted); padding:8px 12px; border-radius:var(--r-sm); background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.06); animation:waiting-pulse 2s infinite; }
@keyframes waiting-pulse { 0%,100%{opacity:.7} 50%{opacity:1} }
.role-btns { display:flex; flex-direction:column; gap:12px; width:100%; max-width:320px; }

/* Deck Builder ──────────────────────────────────────── */
.db-screen{flex:1;display:flex;flex-direction:column;min-height:100vh;}
.db-header{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--bg-panel);flex-wrap:wrap;}
.db-count{font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--text-muted);white-space:nowrap;}
.db-count.ready{color:var(--civ-nature);}
.name-inp{background:var(--bg-panel-raised);border:1px solid rgba(255,255,255,.14);border-radius:var(--r-sm);padding:6px 10px;color:var(--text-primary);font-size:13px;font-family:var(--font-card);width:130px;}
.db-toolbar{padding:8px 12px;background:var(--bg-panel-deep);display:flex;flex-direction:column;gap:6px;}
.db-filters{display:flex;gap:5px;flex-wrap:wrap;}
.flt-btn{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.14);background:transparent;color:var(--text-muted);cursor:pointer;transition:filter .12s;}
.flt-btn:hover{filter:brightness(1.3);}
.flt-btn.active{color:#fff;border-color:var(--fc,#888);background:var(--fc,#888);}
.db-search-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.db-srch{flex:1;min-width:100px;background:var(--bg-panel-raised);border:1px solid rgba(255,255,255,.12);border-radius:var(--r-sm);padding:6px 10px;color:var(--text-primary);font-size:12px;}
.db-srch::placeholder{color:var(--text-faint);}
.db-save-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;font-size:12px;}
.deck-name-inp{background:var(--bg-panel-raised);border:1px solid rgba(255,255,255,.12);border-radius:var(--r-sm);padding:5px 8px;color:var(--text-primary);font-size:12px;width:110px;}
.db-main{flex:1;display:flex;overflow:hidden;}
.db-pool{flex:1;overflow-y:auto;padding:8px;display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px;align-content:start;}
.db-sidebar{width:220px;overflow-y:auto;background:var(--bg-panel-deep);border-left:1px solid rgba(255,255,255,.06);padding:8px 0;}
.pool-wrap{position:relative;cursor:pointer;}
.pool-wrap:hover .card{transform:translateY(-4px);}
.pool-wrap.at-max{opacity:.6;}
.pool-badge{position:absolute;top:4px;right:4px;min-width:17px;height:17px;border-radius:9px;background:rgba(0,0,0,.8);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 3px;}
.pool-badge.maxed{background:var(--civ-dark);}
.deck-civ-hdr{font-size:10px;font-weight:700;letter-spacing:.06em;padding:8px 12px 3px;color:var(--hc,#888);}

.conn-dot { width:7px; height:7px; border-radius:50%; }

/* Shield zone ─────────────────────────── */
.shield-zone { display:flex; align-items:center; justify-content:center; gap:8px; padding:7px 10px; min-height:56px; }
.shield-tile { position:relative; width:38px; height:48px; flex-shrink:0; filter:drop-shadow(0 2px 6px rgba(0,0,0,.55)); }
.shield-tile .sh { width:100%; height:100%; display:block; }
.shield-tile .sh .body { fill:#2b3752; stroke:var(--civ-light); stroke-width:1.1; }
.shield-tile .sh .shine { fill:rgba(255,255,255,.14); }
.shield-zone-label { font-family:var(--font-display); font-size:13px; font-weight:700; color:var(--text-muted); margin-left:4px; }
.shield-zone.empty-warn .shield-zone-label { color:var(--civ-fire); }
.shield-tile.breaking { animation:shieldShatter .95s ease-in forwards; }
.shield-tile.breaking .crack { position:absolute; inset:0; width:100%; height:100%; opacity:0; animation:crackIn .28s steps(3) forwards; }
@keyframes crackIn { 0%{opacity:0;} 100%{opacity:.95;} }
@keyframes shieldShatter {
  0%   { transform:none; opacity:1; }
  28%  { transform:translateX(-2px) rotate(-2deg); }
  34%  { transform:translateX(2px)  rotate(2deg); }
  40%  { transform:translateX(-2px) rotate(-1deg); }
  46%  { transform:translateX(1px); }
  58%  { transform:scale(1.1); opacity:1; }
  100% { transform:scale(1.75) rotate(14deg); opacity:0; filter:brightness(3); }

function effectText(effect, isEtb) {
  if (!effect) return '';
  const p = isEtb ? '出た時、' : '';
  switch (effect.type) {
    case 'draw': return `${p}カードを${effect.value}枚引く。`;
    case 'bounce': return `${p}相手のクリーチャー1体を持ち主の手札に戻す。`;
    case 'ramp': return `${p}自分の山札の上から1枚をマナゾーンに置く。`;
    case 'addShield': return `${p}自分の山札の上から1枚をシールドゾーンに置く。`;
    case 'destroyPowerLE': return `${p}パワー${effect.value}以下の相手クリーチャー1体を破壊する。`;
    case 'regrow': return `${p}自分の墓地のクリーチャー1体を手札に戻す。`;
    case 'buffPower': return `${p}自分のクリーチャー1体のパワーを+${effect.value}する(このターン中)。`;
    case 'tapCreature':    return `${p}相手のクリーチャー1体をタップする。`;
    case 'massDestroyLE': return `${p}パワー${effect.value}以下の相手クリーチャーをすべて破壊する。`;
    case 'destroyAny':    return `${p}相手のクリーチャー1体を破壊する(パワー制限なし)。`;
    case 'multiRamp':     return `${p}山札の上から${effect.count}枚をマナゾーンに置く。`;
    case 'multiAddShield':return `${p}山札の上から${effect.count}枚をシールドゾーンに置く。`;
    case 'massBounce':    return `${p}相手のクリーチャーをすべて手札に戻す。`;
    case 'discardCard':   return `${p}相手は手札を1枚ランダムで捨てる。`;
    case 'multiBounce':   return `${p}相手のクリーチャーを${effect.count}体まで手札に戻す。`;
    case 'massTap':       return `${p}相手のクリーチャーをすべてタップする。`;
    case 'multiRegrow':   return `${p}自分の墓地のクリーチャーを${effect.count}体まで手札に戻す。`;
    case 'multiDiscard':  return `${p}相手は手札を${effect.count}枚ランダムで捨てる。`;
    case 'miradante':     return `${p}コスト5以下の光の呪文を手札から無料で使用してよい。次の自分のターンの始めまで、相手はコスト5以下のクリーチャーを出せない。`;
    case 'freeSummon':    return `手札から合計コスト${effect.budget}以下になるようにクリーチャーを出してよい。`;
    case 'reviveSummon':  return `自分の手札または墓地から好きなクリーチャーを${effect.count}体まで場に出す。`;

    case 'graveShuffle': return `${p}自分の墓地のカードをすべて山札に加えてシャッフルし、その後1枚引く。`;
    case 'sequence':      return `${p}` + effect.steps.map(s => effectText(s, false)).join('');
    default: return '';
  }

RAW_CARDS.forEach(c => {
  if (!c.text) c.text = c.type === 'creature' ? (c.etb ? effectText(c.etb, true) : '') : (c.effect ? effectText(c.effect, false) : '');
  if (!c.abilities) c.abilities = [];
});

function getCardDef(id) { return RAW_CARDS.find(c => c.id === id); }

let _uid = 1;
function makeInstance(defId) { return { uid: 'c' + (_uid++), defId }; }
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function buildDeck() { return shuffle(RAW_CARDS.map(c => makeInstance(c.id))); }

function createPlayer(name, deckIds) {
  const deck = deckIds ? shuffle(deckIds.map(id => makeInstance(id))) : buildDeck();
  const waterCount = deck.filter(c => { const d = getCardDef(c.defId); return d.civ === 'water' || (d.civs || []).includes('water'); }).length;
  return { name, deck, hand: [], mana: [], battle: [], shields: [], graveyard: [], stadiums: [], charged: false, acted: false, waterCount };
}

function other(idx) { return idx === 0 ? 1 : 0; }
function cloneState(state){
  // Deep clone for AI look-ahead. structuredClone is available in modern browsers.
  try { return structuredClone(state); }
  catch(e){ return JSON.parse(JSON.stringify(state)); }
}
/* ═══════════════════════════════════════════════════════════════
   CPU AI — 評価関数ベースの思考ルーチン(レベル2.5)
   盤面を点数化し、1手ごとに最も評価の高い行動を選ぶ。
   見えない情報(相手シールド)を考慮してリーサル判断・除去temp offを行う。
   ═══════════════════════════════════════════════════════════════ */
const AI = {
  // 盤面をAI視点(meIdx)で点数化。高いほどAI有利。
  evaluate(state, meIdx){
    const opp = other(meIdx);
    const me = state.players[meIdx], op = state.players[opp];
    let score = 0;
    // 勝敗は最優先
    if (state.winner === meIdx) return 100000;
    if (state.winner === opp)   return -100000;
    // シールド差(防御力・勝利への距離)
    score += (me.shields.length - op.shields.length) * 55;
    // 相手のシールドが0=次の攻撃で勝てる、非常に高評価
    if (op.shields.length === 0) score += 40;
    if (me.shields.length === 0) score -= 40;
    // 盤面のクリーチャー(パワー合計と頭数)
    const bodyVal = (pl, sign) => {
      for (const c of pl.battle){
        const d = getCardDef(c.defId);
        score += sign * (effectivePower(c)/1000 * 6 + 8);
        if ((d.abilities||[]).includes('guard'))     score += sign * 10; // ブロッカーは守りに価値
        if ((d.abilities||[]).includes('speed'))     score += sign * 3;
        if ((d.abilities||[]).includes('multiBreak')||(d.abilities||[]).includes('powerBreak')||(d.abilities||[]).includes('tideBreak')) score += sign * 6;
        if (c.frozenBy!==undefined)                  score -= sign * 12; // 凍結は無力化
      }
    };
    bodyVal(me, 1); bodyVal(op, -1);
    // 手札(選択肢の多さ)とマナ(展開力)
    score += me.hand.length * 4 - op.hand.length * 3;
    score += me.mana.length * 3;
    // 使えるマナ(アンタップ)も少し
    score += me.mana.filter(m=>!m.tapped).length * 1.5;
    return score;
  },

  // 現在の局面でmeIdxが取れる「単発アクション」を列挙(先読み用)
  enumerateActions(state, meIdx){
    const acts = [];
    const p = state.players[meIdx];
    // マナチャージ(最初の行動のみ)。手札の中で最も「重い/使いにくい」カードを置く候補に。
    if (!p.charged && !p.acted && p.hand.length > 0){
      // マナに置く候補: ダブりや高コストを優先(シンプルに全候補を後で評価)
      for (const c of p.hand) acts.push({ kind:'charge', uid:c.uid });
    }
    // カードを出す/使う
    for (const c of p.hand){
      const d = getCardDef(c.defId);
      const cost = effectiveCost(state, meIdx, d);
      if (d.type === 'creature' && !canPlaceCreature(state, meIdx, d).ok) continue;
      if (canPay(p, d, cost)) acts.push({ kind:'play', uid:c.uid });
    }
    // 墓地召喚
    for (const c of p.graveyard){
      const d = getCardDef(c.defId);
      if (!(d.abilities||[]).includes('graveSummon')) continue;
      if (!canPlaceCreature(state, meIdx, d).ok) continue;
      const gc = Math.max(RULES.SPELL_MIN_COST, d.cost - RULES.GRAVE_SUMMON_DISCOUNT);
      if (canPay(p, d, gc)) acts.push({ kind:'graveplay', uid:c.uid });
    }
    // 攻撃(タップしていない・召喚酔いでない・凍結でない)
    const opp = other(meIdx);
    const oppHasSlow = state.players[opp].battle.some(c=>getCardDef(c.defId).abilities.includes('slowField'));
    for (const c of p.battle){
      if (c.tapped || c.sick || c.frozenBy!==undefined) continue;
      if (c.justEntered && oppHasSlow) continue;
      // プレイヤーへ攻撃
      acts.push({ kind:'atkPlayer', uid:c.uid });
      // タップされた敵クリーチャーへ攻撃(除去)
      for (const t of state.players[opp].battle){
        if (t.tapped) acts.push({ kind:'atkCreature', uid:c.uid, target:t.uid });
      }
    }
    return acts;
  },

  // アクションを複製状態に適用(先読みシミュレーション用)。pendingは自動で無難に解決。
  simulate(state, meIdx, act){
    const s = cloneState(state);
    if (act.kind === 'charge') chargeMana(s, act.uid);
    else if (act.kind === 'play') playCard(s, act.uid);
    else if (act.kind === 'graveplay') playFromGrave(s, act.uid);
    else if (act.kind === 'atkPlayer') declareAttack(s, act.uid, 'player', null);
    else if (act.kind === 'atkCreature') declareAttack(s, act.uid, 'creature', act.target);
    // 発生したpendingをAIにとって無難な形で自動解決
    AI.autoResolve(s, meIdx);
    return s;
  },

  // pendingを解決(先読み内・実戦の相手ターン処理の両方で使用)
  autoResolve(state, meIdx, depth){
    depth = depth || 0;
    let guard = 0;
    while (state.pending && state.winner === null && guard < 40){
      guard++;
      const pend = state.pending;
      if (pend.type === 'block'){
        // 自分が守る側のとき: 価値の高い攻撃(ダイレクト/大型)はブロック
        const defender = pend.defenderIdx;
        const decideBlock = () => {
          // ダイレクトアタックでシールドが少なければブロック
          const op = state.players[other(defender)];
          const atkCard = op.battle.find(c=>c.uid===pend.attackerUid);
          const atkPow = atkCard ? effectivePower(atkCard) : 0;
          // 一番強いブロッカーで受ける(相打ち・耐えるを優先)
          let best=null, bestP=-1;
          for (const uid of pend.options){
            const b = state.players[defender].battle.find(c=>c.uid===uid);
            if (!b) continue;
            const bp = effectivePower(b);
            if (bp > bestP){ bestP=bp; best=uid; }
          }
          const myShields = state.players[defender].shields.length;
          // シールドが1枚以下、または相手が貫通ブレイク持ちならブロックしたい
          const wantBlock = (pend.targetType==='player') && (myShields<=1 || bestP>=atkPow);
          return wantBlock ? best : null;
        };
        resolveBlock(state, decideBlock());
      }
      else if (pend.type === 'ambush'){
        // S・トリガー: 自分に有利なら使う(基本使う)
        const ctrl = pend.controllerIdx;
        // 自分がコントローラなら使う、相手なら…相手のAIも使う想定で使う
        resolveAmbush(state, 'play');
      }
      else if (pend.type === 'chooseTarget'){
        const ctrl = pend.controllerIdx;
        const kind = pend.kind;
        // 破壊・タップ・凍結・バウンス系: 相手の一番強いクリーチャーを狙う
        // 回収・蘇生・無料召喚: 自分の一番強いものを選ぶ
        let chosen = null;
        const pickStrongest = (uids, ownerBattle) => {
          let best=null,bp=-1;
          for(const u of uids){ const c=ownerBattle.find(x=>x.uid===u); if(!c)continue; const p=effectivePower(c); if(p>bp){bp=p;best=u;} }
          return best||uids[0];
        };
        if (['destroy','destroyAny','tap','bounce','freeze'].includes(kind)){
          chosen = pickStrongest(pend.options, state.players[other(ctrl)].battle);
        } else if (kind === 'buff'){
          chosen = pickStrongest(pend.options, state.players[ctrl].battle);
        } else if (kind === 'freeSummon' || kind === 'reviveSummon'){
          // 出せるうち一番強いクリーチャーを出す。skippableなら1体で妥協しない→全部出す
          const hand = [...state.players[ctrl].hand, ...state.players[ctrl].graveyard];
          chosen = pickStrongest(pend.options, hand);
        } else if (kind === 'regrow'){
          const gy = state.players[ctrl].graveyard;
          chosen = pickStrongest(pend.options, gy);
        } else if (kind === 'freeSpell' || kind === 'stadiumCast'){
          chosen = pend.options[0]; // 呪文を無料で使えるなら使う
        } else if (kind === 'selfDiscard'){
          // 一番いらない=一番コストが低いカードを捨てる(雑だが無難)
          let worst=null,wc=99;
          for(const u of pend.options){ const c=state.players[ctrl].hand.find(x=>x.uid===u); if(!c)continue; const cc=getCardDef(c.defId).cost; if(cc<wc){wc=cc;worst=u;} }
          chosen = worst||pend.options[0];
        } else if (kind === 'stadiumPlace'){
          chosen = pend.options[0]; // 下に置いてドロー
        } else {
          chosen = pend.options[0];
        }
        resolvePendingTarget(state, chosen);
      }
      else break;
    }
  },

  // meIdxのターンを丸ごと思考して、実行すべきアクション列を返す(実戦用)
  // 返り値: [{kind,...}, ...] 最後は必ず endTurn 相当
  planTurn(state, meIdx){
    const plan = [];
    let s = cloneState(state);
    let safety = 0;
    while (s.winner === null && safety < 30){
      safety++;
      // pendingがあれば解決を挟む(自分のETB等)
      if (s.pending){ AI.autoResolve(s, meIdx); continue; }
      if (s.active !== meIdx) break; // 自分の番でなくなった
      const acts = AI.enumerateActions(s, meIdx);
      if (acts.length === 0) break;
      // 各アクションを1手シミュレートし、評価が最大のものを選ぶ
      let best=null, bestScore=-Infinity;
      const baseScore = AI.evaluate(s, meIdx);
      for (const a of acts){
        let sc;
        try { const ns = AI.simulate(s, meIdx, a); sc = AI.evaluate(ns, meIdx); }
        catch(e){ continue; }
        // 攻撃はリーサル(勝ち)に繋がると最優先。チャージは軽い加点(展開のため)
        if (a.kind==='charge') sc += 2; // マナは伸ばしたいが出遅れない程度
        if (best===null || sc>bestScore){ bestScore=sc; best=a; }
      }
      if (!best) break;
      // 「今の状態より良くならないアクションしかない」なら手仕舞い(無駄な自爆を避ける)
      // ただし攻撃・チャージ・展開は基本進める。悪化する攻撃だけ止める。
      if (best.kind==='atkPlayer' || best.kind==='atkCreature'){
        if (bestScore < baseScore - 5){ break; } // 攻撃で不利になるなら攻撃しない
      }
      plan.push(best);
      try { s = AI.simulate(s, meIdx, best); } catch(e){ break; }
    }
    plan.push({ kind:'endTurn' });
    return plan;
  },
};

function log(state, msg) { state.log.push(msg); if (state.log.length > 300) state.log.shift(); }
function findInZone(zone, uid) { return zone.find(c => c.uid === uid); }
function removeFromZone(zone, uid) { const i = zone.findIndex(c => c.uid === uid); return i === -1 ? null : zone.splice(i, 1)[0]; }
function removeFromHand(p, uid) { return removeFromZone(p.hand, uid); }
function effectivePower(c) { return getCardDef(c.defId).power + (c.buff || 0); }

function createGame(name1, name2, deckIds1, deckIds2, firstIdx) {
  const first = (firstIdx === 0 || firstIdx === 1) ? firstIdx : 0;
  const state = {
    turnCount: 1, active: first,
    players: [createPlayer(name1 || 'プレイヤー1', deckIds1), createPlayer(name2 || 'プレイヤー2', deckIds2)],
    log: [], pending: null, winner: null, summonLock: null, placeLimit: null, effectQueue: [],
  };
  state.players.forEach(p => {
    for (let i = 0; i < RULES.STARTING_SHIELDS; i++) p.shields.push(p.deck.shift());
    for (let i = 0; i < RULES.STARTING_HAND; i++) p.hand.push(p.deck.shift());
  });
  log(state, `ゲーム開始! 先攻: ${state.players[state.active].name}`);
  startTurn(state);
  return state;
}

function drawCards(state, playerIdx, n) {
  const p = state.players[playerIdx];
  for (let i = 0; i < n; i++) {
    if (state.winner !== null) return;
    if (p.deck.length === 0) {
      state.winner = other(playerIdx);
      log(state, `${p.name} は山札が尽きて敗北した!`);
      return;
    }
    p.hand.push(p.deck.shift());
  }
}

function startTurn(state) {
  const p = state.players[state.active];
  p.mana.forEach(m => m.tapped = false);
  p.battle.forEach(c => { c.tapped = false; c.sick = false; c.justEntered = false; });
  state.players.forEach(pl => pl.battle.forEach(c => { if (c.frozenBy === state.active) delete c.frozenBy; }));
  p.charged = false;
  p.acted = false;
  if (state.summonLock && state.summonLock.expiresAtTurnStartOf === state.active) {
    state.summonLock = null;
    log(state, `時の封印が解除された。`);
  }
  log(state, `--- ターン${state.turnCount}: ${p.name} ---`);
  if (state.turnCount === 1 && RULES.FIRST_TURN_NO_DRAW) {
    log(state, `先攻1ターン目はドローをスキップします。`);
  } else {
    drawCards(state, state.active, RULES.DRAW_PER_TURN);
  }
}

function endTurn(state) {
  if (state.winner !== null || state.pending) return { ok: false };
  if (state.effectQueue && state.effectQueue.length) return { ok: false };
  const p = state.players[state.active];
  const ready = (p.stadiums || []).filter(s => s.under.length >= RULES.STADIUM_TRIGGER_AT);
  if (ready.length > 0) {
    state.effectQueue = state.effectQueue || [];
    const items = ready.map(s => ({ controllerIdx: state.active, effect: { type: '_stadiumTrigger', stadiumUid: s.uid } }));
    state.effectQueue.unshift(...items, { controllerIdx: state.active, effect: { type: '_finishTurn' } });
    drainEffectQueue(state);
    return { ok: true };
  }

  if (p.acted) return { ok: false, reason: 'already-acted' };

function playCard(state, cardUid, manaUids) {

  if (!handCard) return { ok: false, reason: 'not-in-hand' };
  const def = getCardDef(handCard.defId);
  if (def.type === 'creature') {
    const chk = canPlaceCreature(state, state.active, def);

  const cost = effectiveCost(state, state.active, def);

  } else if (!canPay(p, def, cost)) return { ok: false, reason: 'cannot-pay' };

  if (manaUids) manaUids.forEach(u => { const m = p.mana.find(x => x.uid === u); if (m) m.tapped = true; });

  const def = getCardDef(p.graveyard[idx].defId);

      p.battle.push(inst);
      log(state, `${p.name} が「${d.name}」(コスト${d.cost}) を無料で召喚した!`);
      const rem = (budget || 0) - d.cost;
      if (d.etb) triggerEffect(state, controllerIdx, d.etb);
      if (rem > 0) {
        const cont = { type: 'freeSummon', budget: rem, silent: true };
        if (state.pending) {
          state.effectQueue = state.effectQueue || [];
          state.effectQueue.unshift({ controllerIdx, effect: cont });
        } else {
          triggerEffect(state, controllerIdx, cont);
        }
      }
    }
  }
  else if (kind === 'freeze') {
    const oppP = state.players[other(controllerIdx)];
    const c = oppP.battle.find(x => x.uid === chosenUid);
    if (c) {
      c.frozenBy = controllerIdx;
      log(state, `「${getCardDef(c.defId).name}」は凍結された! (次の${state.players[controllerIdx].name}のターンまで攻撃・ブロック不可)`);
    }
  }
  else if (kind === 'selfDiscard') {
    const p = state.players[controllerIdx];
    const i = p.hand.findIndex(x => x.uid === chosenUid);
    if (i >= 0) {
      const disc = p.hand.splice(i, 1)[0];
      p.graveyard.push(disc);
      log(state, `${p.name} が「${getCardDef(disc.defId).name}」を捨てた。`);
    }
  }
  else if (kind === 'stadiumPlace') {
    const p = state.players[controllerIdx];
    const s = (p.stadiums || []).find(x => x.uid === chosenUid);
    if (s && pendCard) {
      s.under.push(pendCard);
      log(state, `${p.name} は呪文を「${getCardDef(s.defId).name}」の下に置いた。(${s.under.length}枚)`);
      drawCards(state, controllerIdx, 1);
      if (state.winner === null) log(state, `${p.name} がカードを1枚引いた。`);
    } else if (pendCard) {
      p.graveyard.push(pendCard);
    }
  }
  else if (kind === 'stadiumCast') {
    const p = state.players[controllerIdx];
    const i = p.hand.findIndex(x => x.uid === chosenUid);
    if (i >= 0) {
      const spellCard = p.hand.splice(i, 1)[0];
      const d = getCardDef(spellCard.defId);
      log(state, `${p.name} が「${d.name}」をコストを支払わずに唱えた!`);
      castSpellEffects(state, controllerIdx, spellCard, d);
    }
  }
  else if (kind === 'reviveSummon') {
    const p = state.players[controllerIdx];
    let rc = null;
    const hi = p.hand.findIndex(x => x.uid === chosenUid);
    if (hi >= 0) rc = p.hand.splice(hi, 1)[0];
    else {
      const gi = p.graveyard.findIndex(x => x.uid === chosenUid);
      if (gi >= 0) rc = p.graveyard.splice(gi, 1)[0];
    }
    if (rc) {
      const d = getCardDef(rc.defId);
      placeCreature(state, controllerIdx, rc, d);
      log(state, `${p.name} が「${d.name}」を場に出した!`);
      const rem = (multi || 1) - 1;
      if (d.etb) triggerEffect(state, controllerIdx, d.etb);
      if (rem > 0) {
        const cont = { type: 'reviveSummon', count: rem, silent: true };
        if (state.pending) {
          state.effectQueue = state.effectQueue || [];
          state.effectQueue.unshift({ controllerIdx, effect: cont });
        } else {
          triggerEffect(state, controllerIdx, cont);
        }
      }
    }
  }
  /* Multi-target effects: re-open selection for remaining picks */
  if (multi && multi > 1 && !state.pending && state.winner === null && kind !== 'reviveSummon' && kind !== 'freeSummon') {
    let opts = [];
    if (kind === 'bounce') opts = state.players[other(controllerIdx)].battle.map(c => c.uid);
    else if (kind === 'regrow') opts = state.players[controllerIdx].graveyard.filter(c => getCardDef(c.defId).type === 'creature').map(c => c.uid);
    else if (kind === 'freeze') opts = state.players[other(controllerIdx)].battle.filter(c => c.frozenBy === undefined).map(c => c.uid);
    if (opts.length > 0) state.pending = { type: 'chooseTarget', kind, controllerIdx, multi: multi - 1, options: opts };
  }
  if (!state.pending) drainEffectQueue(state);
  return { ok: true };
}

function eligibleAttackers(state) {
  const p = state.players[state.active];
  return p.battle.filter(c => !c.tapped && !c.sick);
}

function declareAttack(state, attackerUid, targetType, targetUid) {
  if (state.winner !== null || state.pending) return { ok: false };
  const p = state.players[state.active];
  const opp = state.players[other(state.active)];
  const attacker = p.battle.find(c => c.uid === attackerUid);
  if (!attacker || attacker.tapped || attacker.sick) return { ok: false, reason: 'invalid-attacker' };
  if (attacker.frozenBy !== undefined) return { ok: false, reason: 'frozen' };
  if (attacker.justEntered && opp.battle.some(c => getCardDef(c.defId).abilities.includes('slowField')))
    return { ok: false, reason: 'slow-field' };
  if (targetType === 'creature' && !opp.battle.find(c => c.uid === targetUid)) return { ok: false, reason: 'invalid-target' };
  if (targetType === 'creature') {
    const tgt = opp.battle.find(c => c.uid === targetUid);
    if (!tgt.tapped) return { ok: false, reason: 'cannot-attack-untapped' };
  }

  p.acted = true;
  attacker.tapped = true;
  const _atkName = getCardDef(attacker.defId).name;
  let _tgtName = opp.name;
  if (targetType === 'creature') {
    const _tc = opp.battle.find(c => c.uid === targetUid);
    _tgtName = _tc ? getCardDef(_tc.defId).name : 'クリーチャー';
  }
  state.lastAttack = {
    seq: (state.lastAttack ? state.lastAttack.seq : 0) + 1,
    attackerUid, attackerIdx: state.active,
    targetType, targetUid: targetUid || null, defenderIdx: other(state.active),
    atkName: _atkName, tgtName: _tgtName,
  };
  log(state, `${p.name} の「${getCardDef(attacker.defId).name}」が${targetType==='player'?'ダイレクトアタック':'攻撃'}!`);
  const blockers = opp.battle.filter(c => !c.tapped && getCardDef(c.defId).abilities.includes('guard') && c.uid !== targetUid && c.frozenBy === undefined);
  if (blockers.length > 0) {
    state.pending = {
      type: 'block', attackerUid, targetType, targetUid,
      attackerIdx: state.active, defenderIdx: other(state.active),
      options: blockers.map(c => c.uid),
    };
    log(state, `${opp.name} はブロックを選べます。`);
    return { ok: true, pending: true };
  }
  resolveCombat(state, attacker, targetType, targetUid, null);
  return { ok: true };
}

function resolveBlock(state, blockerUid) {
  if (state.winner !== null || !state.pending || state.pending.type !== 'block') return { ok: false };
  const { attackerUid, targetType, targetUid, attackerIdx, defenderIdx } = state.pending;
  state.pending = null;
  const attacker = state.players[attackerIdx].battle.find(c => c.uid === attackerUid);
  if (!attacker) return { ok: true };
  if (blockerUid) {
    const blocker = state.players[defenderIdx].battle.find(c => c.uid === blockerUid);
    if (blocker) blocker.tapped = true;
  }
  resolveCombat(state, attacker, targetType, targetUid, blockerUid || null);
  return { ok: true };
}

function resolveCombat(state, attacker, targetType, targetUid, blockerUid) {
  const atkIdx = state.active, defIdx = other(state.active);
  const atkP = state.players[atkIdx], defP = state.players[defIdx];
  const attackerDef = getCardDef(attacker.defId);

  if (blockerUid) {
    const blocker = defP.battle.find(c => c.uid === blockerUid);
    log(state, `「${attackerDef.name}」は「${getCardDef(blocker.defId).name}」のブロックを受けた。`);
    fight(state, atkIdx, attacker, defIdx, blocker);
    return;
  }
  if (targetType === 'creature') {
    const target = defP.battle.find(c => c.uid === targetUid);
    if (target) fight(state, atkIdx, attacker, defIdx, target);
    return;
  }
  let breakCount = 1;
  if (attackerDef.abilities.includes('powerBreak')) breakCount = Math.floor(effectivePower(attacker) / RULES.POWER_BREAK_STEP) + 1;
  else if (attackerDef.abilities.includes('tideBreak') && state.players[atkIdx].waterCount >= RULES.TIDE_WATER_REQ) breakCount = RULES.TIDE_BREAK_COUNT;
  else if (attackerDef.abilities.includes('multiBreak')) breakCount = RULES.MULTI_BREAK_COUNT;
  breakShields(state, defIdx, atkIdx, breakCount);
}

function fight(state, atkIdx, attacker, defIdx, defender) {
  const atkP = state.players[atkIdx], defP = state.players[defIdx];
  const aPow = effectivePower(attacker), dPow = effectivePower(defender);
  const aDef = getCardDef(attacker.defId), dDef = getCardDef(defender.defId);
  const atkDT = aDef.abilities.includes('deathtouch');
  const defDT = dDef.abilities.includes('deathtouch');
  const killDef = aPow >= dPow || atkDT;
  const killAtk = dPow >= aPow || defDT;
  if (killDef) {
    removeFromZone(defP.battle, defender.uid);
    defP.graveyard.push({ uid: defender.uid, defId: defender.defId });
  }
  if (killAtk) {
    removeFromZone(atkP.battle, attacker.uid);
    atkP.graveyard.push({ uid: attacker.uid, defId: attacker.defId });
  }
  if (killDef && killAtk) log(state, `「${aDef.name}」と「${dDef.name}」は相打ちで両方破壊された。`);
  else if (killDef)        log(state, `「${aDef.name}」(${aPow}${atkDT?'+毒針':''}) が「${dDef.name}」(${dPow}) を破壊した。`);
  else                     log(state, `「${dDef.name}」(${dPow}${defDT?'+毒針':''}) が「${aDef.name}」(${aPow}) を破壊した。`);
}

function breakShields(state, defIdx, atkIdx, count) {
  const defP = state.players[defIdx];
  if (defP.shields.length === 0) {
    state.winner = atkIdx;
    log(state, `${defP.name} はシールドが無い状態で攻撃を受け、敗北した!`);
    return;
  }
  doBreak(state, defIdx, atkIdx, count);
}
function doBreak(state, defIdx, atkIdx, remaining) {
  const defP = state.players[defIdx];
  if (remaining <= 0 || defP.shields.length === 0) return;
  const shield = defP.shields.shift();
  const sdef = getCardDef(shield.defId);
  defP.hand.push(shield);
  log(state, `${defP.name} のシールドが1枚ブレイクされ、手札に加わった。`);
  const sab = sdef.abilities || [];
  if (sab.includes('ambush') || sab.includes('shieldTrigger')) {
    const isST = sab.includes('shieldTrigger');
    state.pending = { type: 'ambush', isST, controllerIdx: defIdx, cardUid: shield.uid, remaining: remaining - 1, defIdx, atkIdx };
    return;
  }
  doBreak(state, defIdx, atkIdx, remaining - 1);
}

function resolveAmbush(state, choice) {
  if (state.winner !== null || !state.pending || state.pending.type !== 'ambush') return { ok: false };
  const { controllerIdx, cardUid, remaining, defIdx, atkIdx, isST } = state.pending;
  state.pending = null;
  const p = state.players[controllerIdx];
  if (choice === 'play') {
    const handCard = p.hand.find(c => c.uid === cardUid);
    const def = handCard ? getCardDef(handCard.defId) : null;
    if (def && def.type === 'creature' && !canPlaceCreature(state, controllerIdx, def).ok) {
      log(state, `(出す制限があるため手札に加えた)`);
    } else if (def) {
      removeFromHand(p, cardUid);
      if (def.type === 'creature') {
        placeCreature(state, controllerIdx, handCard, def);
        log(state, `${p.name} が${isST ? 'S・トリガー' : '奇襲'}で「${def.name}」を無料でプレイした!`);
        if (def.etb) triggerEffect(state, controllerIdx, def.etb);
      } else if (def.type === 'stadium') {
        p.stadiums.push({ uid: handCard.uid, defId: handCard.defId, under: [] });
        log(state, `${p.name} が${isST ? 'S・トリガー' : '奇襲'}で「${def.name}」を場に出した!`);
      } else {
        log(state, `${p.name} が${isST ? 'S・トリガー' : '奇襲'}で「${def.name}」を無料で使用した!`);
        castSpellEffects(state, controllerIdx, handCard, def);
      }
    }
  } else {
    log(state, `${p.name} はそのまま手札に加えた。`);
  }
  if (state.winner === null && remaining > 0) {
    if (!state.pending) {
      doBreak(state, defIdx, atkIdx, remaining);
    } else {
      state.effectQueue = state.effectQueue || [];
      state.effectQueue.unshift({ controllerIdx: atkIdx, effect: { type: '_continueBreak', defIdx, atkIdx, remaining } });
    }
  }
  if (!state.pending && state.winner === null) drainEffectQueue(state);
  return { ok: true };
}

/* ── Turn logic ── */
function isMyDecision(){
  if(ui.role==='spectator') return false;
  if(!game||game.winner!==null) return false;
  if(!game.pending) return game.active===ui.myIdx;
  const p=game.pending;
  if(p.type==='block')        return p.defenderIdx===ui.myIdx;
  if(p.type==='ambush')       return p.controllerIdx===ui.myIdx;
  if(p.type==='chooseTarget') return p.controllerIdx===ui.myIdx;
  return false;
}

/* ── Engine ── */
function applyAction(msg){
  if(!game || game.winner!==null) return;
  const k=msg.kind;
  // Determine who is allowed to act right now.
  let allowed;
  if(game.pending){
    // During a pending decision, only its controller may respond.
    const pc=game.pending.controllerIdx;
    allowed = (pc===undefined) ? game.active : pc;
    // block/ambush belong to the defender/breaker recorded on the pending object
    if(game.pending.type==='block' && game.pending.defenderIdx!==undefined) allowed=game.pending.defenderIdx;
    if(game.pending.type==='ambush' && game.pending.defIdx!==undefined) allowed=game.pending.defIdx;
  } else {
    allowed = game.active;
  }
  // If the message carries a sender and it isn't that player's turn/decision, drop it.
  if(msg.by!==undefined && msg.by!==allowed){ return; }
  if     (k==='chargeMana')    chargeMana(game,msg.uid);
  else if(k==='playCard')      playCard(game,msg.uid,msg.manaUids);
  else if(k==='playFromGrave') playFromGrave(game,msg.uid,msg.manaUids);
  else if(k==='attackPlayer')  declareAttack(game,msg.attackerUid,'player',null);
  else if(k==='attackCreature') declareAttack(game,msg.attackerUid,'creature',msg.targetUid);
  else if(k==='blockChoose')   resolveBlock(game,msg.blockerUid);
  else if(k==='blockDecline')  resolveBlock(game,null);
  else if(k==='ambushPlay')    resolveAmbush(game,'play');
  else if(k==='ambushKeep')    resolveAmbush(game,'keep');
  else if(k==='targetChoose')  resolvePendingTarget(game,msg.uid);
  else if(k==='targetSkip')    resolvePendingTarget(game,null);
  else if(k==='endTurn')       endTurn(game);
}
function sendToPeer(data){ if(conn&&conn.open) conn.send(data); }
function broadcastState(){
  if(ui.role!=='host'||!game) return;
  const msg={type:'STATE',game:JSON.stringify(game),spectators:spectators.length};
  if(conn&&conn.open) conn.send(msg);
  spectators.forEach(s=>{ try{ if(s.open) s.send(msg); }catch(e){} });
}
function afterEngineAction(){ broadcastState(); detectAttack(); detectShieldBreak(); if(game.winner!==null) ui.screen='gameover'; render(); maybeRunCpu(); }

/* ── CPU battle ── */
function makeCpuDeck(){
  // Build a reasonable random 40-card deck for the CPU (avoids P1-only cards).
  const pool = RAW_CARDS.filter(c=>!c.p1Only);
  const ids = pool.map(c=>c.id);
  const deck=[], counts={};
  // Bias slightly toward a mix of creatures and removal for competence.
  while(deck.length<40){
    const id=ids[Math.floor(Math.random()*ids.length)];
    counts[id]=counts[id]||0;
    if(counts[id]<4){ deck.push(id); counts[id]++; }
  }
  return deck;
}
function startCpuGame(){
  const cpuDeck=makeCpuDeck();
  const firstIdx=decideFirstIdx();
  game=createGame(playerName||'あなた','CPU',hostDeckIds,cpuDeck,firstIdx);
  ui.prevShields=null; ui.breakAnim=null; ui.prevAttackSeq=0; ui.attackAnim=null;
  ui.screen='play'; render();
  detectShieldBreak(); detectAttack();
  maybeRunCpu();
}
function maybeRunCpu(){
  if(!cpuMode || !game || game.winner!==null) return;
  // If it's the CPU's turn (index 1) and nothing is pending for the human, let the AI act.
  if(game.active===1 && !cpuThinking){
    // If there's a pending decision that belongs to the HUMAN (e.g. block/ST on our attack), don't auto-run.
    if(game.pending){
      const owner = cpuDecisionOwner(game.pending);
      if(owner===0) return; // human must decide first
    }
    cpuThinking=true;
    setTimeout(runCpuTurn, 650); // small delay so it feels like it's thinking
  } else if(game.pending){
    // Pending decision during the human's turn that belongs to the CPU (e.g. CPU blocks our attack / CPU ST).
    const owner = cpuDecisionOwner(game.pending);
    if(owner===1 && !cpuThinking){
      cpuThinking=true;
      setTimeout(runCpuDecision, 600);
    }
  }
}
function cpuDecisionOwner(pend){
  if(!pend) return null;
  if(pend.type==='block') return pend.defenderIdx;
  if(pend.type==='ambush') return pend.defIdx!==undefined?pend.defIdx:pend.controllerIdx;
  if(pend.type==='chooseTarget') return pend.controllerIdx;
  return game.active;
}
function runCpuDecision(){
  // Resolve a single pending decision that belongs to the CPU, then hand control back.
  try{ AI.autoResolve(game, 1); }catch(e){ console.warn('cpu decision err',e); }
  cpuThinking=false;
  detectAttack(); detectShieldBreak();
  if(game.winner!==null) ui.screen='gameover';
  render();
  maybeRunCpu();
}
function runCpuTurn(){
  if(!game || game.winner!==null){ cpuThinking=false; return; }
  let plan;
  try{ plan=AI.planTurn(game, 1); }
  catch(e){ console.warn('cpu plan err',e); plan=[{kind:'endTurn'}]; }
  // Execute the plan step by step with small delays for readability.
  let i=0;
  function step(){
    if(!game || game.winner!==null){ cpuThinking=false; render(); return; }
    // If a human-owned decision appears mid-plan, stop and wait for the human.
    if(game.pending){
      const owner=cpuDecisionOwner(game.pending);
      if(owner===0){ cpuThinking=false; detectAttack(); detectShieldBreak(); render(); return; }
      // CPU-owned pending: resolve then continue.
      try{ AI.autoResolve(game,1); }catch(e){}
      detectAttack(); detectShieldBreak(); render();
      setTimeout(step, 500); return;
    }
    if(i>=plan.length){ cpuThinking=false; return; }
    const a=plan[i++];
    try{
      if(a.kind==='charge') chargeMana(game,a.uid);
      else if(a.kind==='play') playCard(game,a.uid);
      else if(a.kind==='graveplay') playFromGrave(game,a.uid);
      else if(a.kind==='atkPlayer') declareAttack(game,a.uid,'player',null);
      else if(a.kind==='atkCreature') declareAttack(game,a.uid,'creature',a.target);
      else if(a.kind==='endTurn') endTurn(game);
    }catch(e){ console.warn('cpu step err',a,e); }
    detectAttack(); detectShieldBreak();
    if(game.winner!==null){ ui.screen='gameover'; cpuThinking=false; render(); return; }
    render();
    setTimeout(step, 550);
  }
  step();
}
let actionInFlight=false;
function dispatchAction(msg){
  ui.modal=null; ui.graveyardView=null; ui.selectedAttackerUid=null; ui.manaPay=null; ui.manaSelected=[];
  // Stamp who is requesting so the host can reject stale/duplicate actions.
  msg.by = ui.myIdx;
  if(ui.role==='host'){ applyAction(msg); afterEngineAction(); }
  else{
    // Guard the guest against double-taps while an action is being round-tripped.
    if(actionInFlight) { render(); return; }
    actionInFlight=true;
    sendToPeer({type:'ACTION',...msg});
    render();
    setTimeout(()=>{ actionInFlight=false; },600);
  }
}

    } else if(data.type==='ACTION'){ applyAction(data); afterEngineAction(); }
  } else {
    if(data.type==='STATE'){
      game=JSON.parse(data.game);
      ui.spectatorCount=data.spectators||0;

        deckInProgress=[]; deckFilter='all'; deckSearch=''; ui.deckView='pool';

      }
    }
  }
}

/* ── PeerJS setup ── */
const PEER_CONFIG = {
  debug: 1,
  config: { iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'stun:stun.cloudflare.com:3478' },
    { urls: 'turn:openrelay.metered.ca:80',  username: 'openrelayproject', credential: 'openrelayproject' },
    { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
    { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' },
  ] }
};
let lastPeerError = '';
function onVisible(){
  if(document.visibilityState!=='visible') return;
  // Coming back to the foreground: revive broker + data link if needed.
  if(peer && peer.disconnected && !peer.destroyed){ try{ peer.reconnect(); }catch(e){} }
  requestWakeLock();
  const stale = Date.now()-lastPongAt > 9000;
  if((conn && !conn.open) || (stale && ui.screen!=='start' && (ui.role==='guest'||ui.role==='host'))){
    if(!connReviving && ui.screen!=='start' && ui.screen!=='gameover'){ onConnDrop(); }
  } else {
    // link still healthy — make sure heartbeat is running
    if(!heartbeatTimer && conn && conn.open) startHeartbeat();
  }
}
async function requestWakeLock(){
  try{
    if('wakeLock' in navigator && document.visibilityState==='visible'){
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release',()=>{});
    }
  }catch(e){}
}
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible') requestWakeLock(); });
function genCode(){
  const ch='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:6},()=>ch[Math.floor(Math.random()*ch.length)]).join('');
}
function destroyPeer(){
  stopHeartbeat();
  if(graceTimer){clearTimeout(graceTimer);graceTimer=null;}
  connReviving=false;
  if(wakeLock){ try{ wakeLock.release(); }catch(e){} wakeLock=null; } if(peer){try{peer.destroy();}catch(e){} peer=null; conn=null;} }
let heartbeatTimer=null, graceTimer=null, lastPongAt=0, connReviving=false;
function startHeartbeat(){
  stopHeartbeat();
  lastPongAt=Date.now();
  heartbeatTimer=setInterval(()=>{
    // Host pings guest; both answer pings with pongs. Keeps the data channel warm.
    try{ if(conn&&conn.open) conn.send({type:'PING',t:Date.now()}); }catch(e){}
    try{ spectators.forEach(s=>{ if(s.open) s.send({type:'PING'}); }); }catch(e){}
  }, 4000);
}
function stopHeartbeat(){ if(heartbeatTimer){clearInterval(heartbeatTimer);heartbeatTimer=null;} }
function attachConn(c){
  conn=c;
  c.on('data',handlePeerData);
  c.on('open',()=>{ connReviving=false; if(graceTimer){clearTimeout(graceTimer);graceTimer=null;} startHeartbeat(); if(ui.screen==='reconnecting'){ ui.screen=game?(game.winner!==null?'gameover':'play'):'deckBuilder'; render(); requestWakeLock(); } });
  c.on('close',()=>{ onConnDrop(); });
  c.on('error',e=>{ console.warn('conn err',e); onConnDrop(); });
}
function onConnDrop(){
  if(ui.role==='spectator'){ if(ui.screen!=='start'){ui.screen='disconnected';render();} return; }
  if(ui.screen==='start'||ui.screen==='gameover') return;
  // Don't jump straight to the disconnect screen — give the link a chance to come back.
  if(connReviving) return;
  connReviving=true;
  ui.screen='reconnecting'; render();
  attemptRevive(0);
}
function attemptRevive(tries){
  if(!connReviving) return;
  if(tries>=8){ connReviving=false; ui.screen='disconnected'; render(); return; }
  // Make sure our own peer is back on the broker first
  if(peer && peer.disconnected && !peer.destroyed){ try{ peer.reconnect(); }catch(e){} }
  if(ui.role==='guest' && peer && !peer.destroyed && roomTarget){
    try{
      const c=peer.connect(roomTarget,{reliable:true,serialization:'json'});
      attachConn(c);
    }catch(e){}
  }
  // Host just waits for the guest to reconnect to its stable ID; keep peer alive.
  graceTimer=setTimeout(()=>attemptRevive(tries+1), 2500);
}
function createRoom(){
  ui.role='host'; ui.myIdx=0; playerName='プレイヤー1';
  roomCode=genCode(); ui.screen='creatingRoom'; render();
  destroyPeer();
  peer=new Peer('five-crest-'+roomCode.toLowerCase(), PEER_CONFIG);
  peer.on('open',()=>{ ui.screen='waitingForPeer'; render(); });
  peer.on('connection',c=>{
    if(c.metadata && c.metadata.spectator){
      spectators.push(c);
      c.on('open',()=>{
        try{
          if(game) c.send({type:'STATE',game:JSON.stringify(game),spectators:spectators.length});
          else c.send({type:'WAIT'});
        }catch(e){}
        broadcastState(); render();
      });
      c.on('close',()=>{ spectators=spectators.filter(x=>x!==c); broadcastState(); render(); });
      c.on('error',()=>{ spectators=spectators.filter(x=>x!==c); });
      return;
    }
    // Reject extra player connections: this room already has an opponent
    if(conn && conn.open){
      c.on('open',()=>{ try{ c.send({type:'ROOM_FULL'}); }catch(e){} setTimeout(()=>{try{c.close();}catch(e){}},300); });
      return;
    }
    attachConn(c);
    c.on('open',()=>{
      hostDeckIds=null; guestDeckIds=null;
      deckInProgress=[]; deckFilter='all'; deckSearch=''; ui.deckView='pool';
      ui.screen='deckBuilder'; render();
    });
  });
  peer.on('disconnected',()=>{
    // Broker connection lost (tab suspended etc.) — reclaim the same room ID
    if(peer && !peer.destroyed){ try{ peer.reconnect(); }catch(e){} }
  });
  startHeartbeat();
  requestWakeLock();
  peer.on('error',err=>{
    if(err.type==='unavailable-id'){ roomCode=genCode(); createRoom(); return; }
    if(err.type==='network'){ return; } // transient broker drop; reconnect handler will recover
    lastPeerError=err.type||String(err);
    ui.screen='connError'; render();
  });
  document.addEventListener('visibilitychange',onVisible);
}
function joinRoom(code, spectate){
  if(spectate){ ui.role='spectator'; ui.myIdx=0; }
  else { ui.role='guest'; ui.myIdx=1; playerName='プレイヤー2'; }
  ui.screen='connecting'; render();
  destroyPeer();
  const targetId='five-crest-'+code.trim().toLowerCase();
  roomTarget=targetId;
  let retries=0;
  const MAX_RETRIES=5;
  peer=new Peer(PEER_CONFIG);
  function tryConnect(){
    if(!peer||peer.destroyed||ui.screen!=='connecting')return;
    const c=peer.connect(targetId,{reliable:true,serialization:'json',metadata:{spectator:!!spectate}});
    attachConn(c);
    c.on('open',()=>{
      if(spectate){ ui.screen='spectatorWait'; render(); return; }
      hostDeckIds=null; guestDeckIds=null;
      deckInProgress=[]; deckFilter='all'; deckSearch=''; ui.deckView='pool';
      ui.screen='deckBuilder'; render();
    });
  }
  peer.on('open',tryConnect);
  peer.on('error',err=>{
    if(err.type==='peer-unavailable' && retries<MAX_RETRIES && ui.screen==='connecting'){
      retries++;
      // Host tab may be waking up / re-registering — retry after a short wait
      setTimeout(tryConnect, 3000);
      return;
    }
    lastPeerError=err.type||String(err); ui.screen='connError'; render();
  });
  setTimeout(()=>{ if(ui.screen==='connecting'){lastPeerError=lastPeerError||'timeout (接続タイムアウト)'; ui.screen='connError';render();} },30000);
}

function attackResolving(){
  // An attack is still being resolved while there's a block/ambush decision pending,
  // or the effect queue still holds break-continuation steps.
  if(!game) return false;
  if(game.pending && (game.pending.type==='block' || game.pending.type==='ambush')) return true;
  if(game.effectQueue && game.effectQueue.some(e=>e.effect && e.effect.type==='_continueBreak')) return true;
  return false;
}
function detectAttack(){
  if(!game||!game.lastAttack){return;}
  const la=game.lastAttack;
  if(la.seq===ui.prevAttackSeq){
    // Same attack still in progress: if it has finished resolving, start the fade-out timer.
    if(ui.attackAnim && ui.attackAnim.seq===la.seq && !ui.attackAnim.hideScheduled && !attackResolving()){
      ui.attackAnim.hideScheduled=true;
      const sq=la.seq;
      setTimeout(()=>{ if(ui.attackAnim&&ui.attackAnim.seq===sq){ui.attackAnim=null;render();} }, 1200);
    }
    return;
  }
  ui.prevAttackSeq=la.seq;
  // Names captured at declare-time (survive destruction)
  const atkName=la.atkName||'クリーチャー';
  const targetName=la.tgtName||(la.targetType==='player'?game.players[la.defenderIdx].name:'クリーチャー');
  const direct=la.targetType==='player';
  ui.attackAnim={ seq:la.seq, attackerUid:la.attackerUid, targetUid:la.targetUid,
    targetType:la.targetType, atkName, targetName, direct, ts:Date.now(), hideScheduled:false };
  // If the attack already fully resolved in one step (no block/ST), fade after a short beat.
  if(!attackResolving()){
    ui.attackAnim.hideScheduled=true;
    const sq=la.seq;
    setTimeout(()=>{ if(ui.attackAnim&&ui.attackAnim.seq===sq){ui.attackAnim=null;render();} }, 1600);
  }
  // Otherwise the banner stays until resolution completes (a later detectAttack call schedules the hide).
}
function attackBannerHTML(){
  if(!ui.attackAnim)return '';
  const a=ui.attackAnim;
  const resolving=attackResolving()&&!a.hideScheduled;
  const statusLine = a.direct
    ? (resolving?'ダイレクトアタック — 処理中...':'ダイレクトアタック!')
    : (resolving?'アタック — 処理中...':'アタック');
  const cls = a.direct ? 'attack-banner direct' : 'attack-banner';
  return `<div class="${cls}${resolving?' resolving':''}"><div class="ab-main">⚔ ${esc(a.atkName)} <span class="ab-arrow">➤</span> ${esc(a.targetName)}</div><div class="ab-sub">${statusLine}</div></div>`;
}
function detectShieldBreak(){
  if(!game){ui.prevShields=null;return;}
  const cur=[game.players[0].shields.length,game.players[1].shields.length];
  if(ui.prevShields){
    for(let i=0;i<2;i++){
      if(cur[i]<ui.prevShields[i]){
        ui.breakAnim={playerIdx:i,count:ui.prevShields[i]-cur[i],ts:Date.now()};
        setTimeout(()=>{if(ui.breakAnim&&Date.now()-ui.breakAnim.ts>=900){ui.breakAnim=null;render();}},1000);
      }
    }
  }
  ui.prevShields=cur;
}

function autoSelectMana(p,def,costOverride){
  const cost=(costOverride!==undefined)?costOverride:def.cost;
  const untapped=p.mana.filter(m=>!m.tapped);
  const civs=def.civs||[def.civ];
  const sel=[];
  for(const cv of civs){
    const m=untapped.find(x=>!sel.includes(x.uid)&&manaCivs(x).includes(cv));
    if(m)sel.push(m.uid);
  }
  for(const m of untapped){
    if(sel.length>=cost)break;
    if(!sel.includes(m.uid))sel.push(m.uid);
  }
  return sel.slice(0,cost);
}

    'peer-unavailable': 'コードが間違っているか、P1の画面がスリープ/他アプリに切り替わっています。P1の画面をこのゲームに戻した状態で、もう一度お試しください。',
    'network': 'PeerJS仲介サーバーに接続できません。Wi-Fi/通信環境を確認するか、少し待って再試行してください。',
    'timeout (接続タイムアウト)': '相手との直接通信を確立できませんでした。両方の端末を同じWi-Fiに接続すると成功しやすくなります。',
    'server-error': 'PeerJSサーバー側のエラーです。しばらく待って再試行してください。',
    'browser-incompatible': 'このブラウザはWebRTC非対応です。Safari/Chrome/Edgeの最新版をお使いください。',
    'room-full': 'このルームにはすでに対戦相手が接続しています。新しいルームを作成してもらってください。',
  };
  const hint = hints[lastPeerError] || '';
  return `<div class="screen-center" style="gap:14px;">
    <div class="logo-sub" style="color:var(--civ-fire);">接続エラー</div>
    <div style="font-size:13px;color:var(--text-muted);text-align:center;max-width:300px;">ルームが見つからないか、接続に失敗しました。</div>
    ${lastPeerError?`<div style="font-size:11px;color:var(--text-faint);text-align:center;">エラー種別: ${esc(lastPeerError)}</div>`:''}
    ${hint?`<div style="font-size:12px;color:var(--civ-light);text-align:center;max-width:300px;line-height:1.7;">💡 ${esc(hint)}</div>`:''}
    <button class="btn btn-primary" data-action="show-join">もう一度試す</button>
    <button class="btn btn-ghost btn-sm" data-action="go-start">← ホームへ</button>
  </div>`;
}

/* =====================================================================
   RENDER
   ===================================================================== */
function render(){
  const app=document.getElementById('app');
  // Remember hand scroll positions so using a card doesn't jump the hand back to the start.
  const _handScroll={};
  document.querySelectorAll('.hand-row[id]').forEach(r=>{ _handScroll[r.id]=r.scrollLeft; });
  let html;
  if     (ui.screen==='start')           html=startScreenHTML();
  else if(ui.screen==='creatingRoom')    html=creatingRoomHTML();
  else if(ui.screen==='waitingForPeer')  html=waitingForPeerHTML();
  else if(ui.screen==='enterCode')       html=enterCodeHTML();
  else if(ui.screen==='connecting')      html=connectingHTML();
  else if(ui.screen==='connError')       html=connErrorHTML();
  else if(ui.screen==='disconnected')    html=disconnectedHTML();
  else if(ui.screen==='deckBuilder')     html=deckBuilderScreenHTML();
  else if(ui.screen==='waitingForReady') html=waitingForReadyHTML();
  else if(ui.screen==='spectatorWait')   html=spectatorWaitHTML();
  else if(ui.screen==='reconnecting')     html=reconnectingHTML();
  else if(ui.screen==='gameover')        html=gameOverScreenHTML();
  else{
    html=renderBoard();
    html+=pendingModalHTML();
    if(!game.pending){html+=cardModalHTML();html+=graveyardModalHTML();html+=manaPayModalHTML();html+=stadiumModalHTML();}
    html+=attackBannerHTML();
  }
  app.innerHTML=html;
  // Restore hand scroll positions captured before the re-render.
  Object.keys(_handScroll).forEach(id=>{ const r=document.getElementById(id); if(r) r.scrollLeft=_handScroll[id]; });
  const feed=document.getElementById('logFeed');
  if(feed)feed.scrollTop=feed.scrollHeight;
  if(ui.screen==='deckBuilder'){
    const srch=document.getElementById('dbSrch');
    if(srch){
      srch.addEventListener('input',e=>{
        deckSearch=e.target.value;
        const q=e.target.value.toLowerCase();
        document.querySelectorAll('.pool-wrap').forEach(el=>{el.style.display=(el.dataset.name||'').toLowerCase().includes(q)?'':'none';});
      });
    }
    // focus code input
    const ci=document.getElementById('codeInp');if(ci)ci.focus();
  }
  if(ui.screen==='enterCode'){
    const ci=document.getElementById('codeInp');if(ci){ci.focus();ci.addEventListener('keydown',e=>{if(e.key==='Enter')document.querySelector('[data-action="connect-room"]')?.click();});}
  }
}

/* =====================================================================
   EVENTS
   ===================================================================== */
document.getElementById('app').addEventListener('click',e=>{
  const el=e.target.closest('[data-action]');
  if(!el)return;
  const action=el.dataset.action, uid=el.dataset.uid;

  switch(action){
    /* ── Navigation ── */
    case 'create-room': createRoom(); break;
    case 'show-join':   joinMode='play'; ui.screen='enterCode'; render(); break;
    case 'show-watch':  joinMode='spectate'; ui.screen='enterCode'; render(); break;
    case 'start-cpu': {
      cpuMode=true; ui.role='host'; ui.myIdx=0; playerName=playerName||'あなた';
      hostDeckIds=null; guestDeckIds=null;
      deckInProgress=[]; deckFilter='all'; deckSearch=''; ui.deckView='pool';
      ui.screen='deckBuilder'; render(); break;
    }
    case 'connect-room': {
      const code=(document.getElementById('codeInp')?.value||'').trim().toUpperCase();
      if(code.length===6) joinRoom(code, joinMode==='spectate');
      else alert('6文字のコードを入力してください。');
      break;
    }
    case 'go-start': cpuMode=false; cpuThinking=false; destroyPeer(); ui.screen='start'; render(); break;

    /* ── Deck Builder ── */
    case 'turn-choice': turnChoice=el.dataset.tc; render(); break;
    case 'db-filter':  deckFilter=el.dataset.civ; render(); break;
    case 'db-view':    ui.deckView=el.dataset.view; render(); break;
    case 'pool-add':   deckAdd(el.dataset.id); render(); break;
    case 'deck-add':   deckAdd(el.dataset.id); render(); break;
    case 'deck-rem':   deckRemove(el.dataset.id); render(); break;
    case 'db-save': {
      const n=(document.getElementById('deckNameInp')?.value?.trim()||'マイデッキ').slice(0,15);
      saveDeck(`[${ui.role==='host'?'P1':'P2'}] ${n}`,[...deckInProgress]);
      alert(`「${n}」を保存しました。`); render(); break;
    }
    case 'db-load': {
      const sel=document.getElementById('deckLoadSel');const n=sel?.value;
      if(n){const d=loadSavedDecks();if(d[n]){
        deckInProgress=[...d[n]].filter(id=>{const c=getCardDef(id);return c&&(!c.p1Only||ui.role==='host');});
        render();
      }} break;
    }
    case 'db-delete': {
      const sel=document.getElementById('deckLoadSel');const n=sel?.value;
      if(!n){ alert('削除するデッキを選んでください。'); break; }
      if(confirm(`「${n}」を削除しますか?この操作は取り消せません。`)){
        deleteDeck(n); render();
      }
      break;
    }
    case 'db-ready': {
      const ne=document.getElementById('nameInp');if(ne)playerName=(ne.value.trim()||playerName).slice(0,10);
      if(deckInProgress.length<40)break;
      if(cpuMode){
        hostDeckIds=[...deckInProgress];
        startCpuGame();
        break;
      }
      if(ui.role==='host'){
        hostDeckIds=[...deckInProgress];
        if(guestDeckIds){game=createGame(playerName,guestPlayerName,hostDeckIds,guestDeckIds,decideFirstIdx());ui.prevShields=null;ui.breakAnim=null;ui.prevAttackSeq=0;ui.attackAnim=null;ui.screen='play';broadcastState();render();}
        else{ui.screen='waitingForReady';render();}
      } else {
        sendToPeer({type:'DECK_READY',deck:[...deckInProgress],name:playerName});
        ui.screen='waitingForReady';render();
      }
      break;
    }
    case 'db-back': ui.screen='deckBuilder'; render(); break;

    /* ── Game UI ── */
    case 'open-hand-card': ui.modal={kind:'hand',uid};ui.graveyardView=null;render();break;
    case 'view-card':      ui.modal={kind:'view',uid};ui.graveyardView=null;render();break;
    case 'close-modal':    ui.modal=null;ui.graveyardView=null;ui.stadiumView=null;render();break;
    case 'view-graveyard': ui.graveyardView=parseInt(el.dataset.owner,10);ui.modal=null;ui.stadiumView=null;render();break;
    case 'view-stadium': ui.stadiumView={uid,owner:parseInt(el.dataset.owner,10)};ui.modal=null;ui.graveyardView=null;render();break;
    case 'select-attacker':  ui.selectedAttackerUid=uid;render();break;
    case 'cancel-attack':    ui.selectedAttackerUid=null;render();break;

    /* ── Engine ── */
    case 'hand-scroll': {
      const row=document.getElementById(el.dataset.row);
      if(row){ const dir=parseInt(el.dataset.dir,10)||1; row.scrollBy({left:dir*180,behavior:'smooth'}); }
      break;
    }
    case 'charge-mana':  ui.modal=null;dispatchAction({kind:'chargeMana',uid});break;
    case 'open-mana-pay': {
      const p=getPlayer(ui.myIdx);
      const hc=p.hand.find(c=>c.uid===uid);
      if(hc){const def=getCardDef(hc.defId);const ec=effectiveCost(game,ui.myIdx,def);ui.manaPay={cardUid:uid};ui.manaSelected=autoSelectMana(p,def,ec);ui.modal=null;}
      render();break;
    }
    case 'open-grave-pay': {
      const p=getPlayer(ui.myIdx);
      const gc=p.graveyard.find(c=>c.uid===uid);
      if(gc){const def=getCardDef(gc.defId);const ec=Math.max(RULES.SPELL_MIN_COST,def.cost-RULES.GRAVE_SUMMON_DISCOUNT);ui.manaPay={cardUid:uid,fromGrave:true};ui.manaSelected=autoSelectMana(p,def,ec);ui.modal=null;ui.graveyardView=null;}
      render();break;
    }
    case 'mana-toggle': {
      const i=ui.manaSelected.indexOf(uid);
      if(i===-1)ui.manaSelected.push(uid);else ui.manaSelected.splice(i,1);
      render();break;
    }
    case 'mana-pay-cancel': ui.manaPay=null;ui.manaSelected=[];render();break;
    case 'mana-pay-confirm': {
      const mp=ui.manaPay;const sel=[...ui.manaSelected];
      ui.manaPay=null;ui.manaSelected=[];
      if(mp)dispatchAction({kind:mp.fromGrave?'playFromGrave':'playCard',uid:mp.cardUid,manaUids:sel});
      break;
    }
    case 'target-skip':  dispatchAction({kind:'targetSkip'});break;
    case 'attack-player':  { const a=ui.selectedAttackerUid;dispatchAction({kind:'attackPlayer',attackerUid:a});break;}
    case 'attack-creature':{ const a=ui.selectedAttackerUid;dispatchAction({kind:'attackCreature',attackerUid:a,targetUid:uid});break;}
    case 'block-choose':  dispatchAction({kind:'blockChoose',blockerUid:uid});break;
    case 'block-decline': dispatchAction({kind:'blockDecline'});break;
    case 'ambush-play':   dispatchAction({kind:'ambushPlay'});break;
    case 'ambush-keep':   dispatchAction({kind:'ambushKeep'});break;
    case 'target-choose': dispatchAction({kind:'targetChoose',uid});break;
    case 'end-turn':      if(el.disabled)break; el.disabled=true; dispatchAction({kind:'endTurn'});break;

    /* ── Post-game ── */
    case 'play-again':
      if(cpuMode){ deckInProgress=[...(hostDeckIds||[])]; startCpuGame(); break; }
      if(ui.role==='host'){
        hostDeckIds=null;guestDeckIds=null;
        deckInProgress=[];deckFilter='all';deckSearch='';ui.deckView='pool';
        ui.selectedAttackerUid=null;ui.modal=null;ui.graveyardView=null;
        sendToPeer({type:'RESTART'});
        ui.screen='deckBuilder';render();
      }
      break;
  }
});

// Check URL hash for room code (P2 convenience link)
(()=>{
  const hash=window.location.hash.slice(1).toUpperCase();
  if(/^[A-Z2-9]{6}$/.test(hash)){
    ui.screen='enterCode'; render();
    setTimeout(()=>{const ci=document.getElementById('codeInp');if(ci)ci.value=hash;},50);
  } else {
    render();
  }
})();

</script>
